# If set, measures and reports inference runtime (disables tqdm).
benchmark: false
cfgp_size: 0
# Directory for caching S3 checkpoints.
checkpoint_cache_dir: null
# Hugging Face checkpoint directory.
checkpoint_hf: null
# Checkpoint type.
checkpoint_type: null
# Compile with symbolic-shape kernels (maps to ``torch.compile(dynamic=...)``).
#
# Defaults to ``True`` for backward compatibility with training, which can
# see varying shapes across batches.  Setting to ``False`` produces faster
# kernels when the shapes are stable (e.g. single-prompt AR inference), at
# the cost of a recompile on shape change.
compile_dynamic: true
compiled_region: all
# Hydra config store module, Hydra config yaml file, or Hugging Face model json file.
config_file: cosmos3/_src/vfm/configs/base/config.py
# Hydra config file type.
config_file_type: null
cp_size: 0
# Path to S3 credentials file for remote checkpoint loading.
credential_path: credentials/gcp_checkpoint.secret
# If True, enable debug outputs.
debug: false
# Fraction of device memory to use for model weights.
#
# Used for automatic sharding.
device_memory_utilization: 0.75
dp_replicate_size: 0
dp_shard_size: 0
# Hydra experiment name.
experiment: ''
# Hydra experiment overrides.
experiment_overrides: []
# Enable guardrails.
guardrails: false
# If True, catch and log errors instead of raising them.
keep_going: false
# Maximum total tokens per batch.  When set, samples are packed into
# batches by token count.
max_model_len: null
# Maximum number of sequences per batch.  When set, samples are packed into
# batches by number of sequences.
max_num_seqs: 1
# Approximate model size in bytes.
model_memory_bytes: null
model_size: null
# Offload guardrail models to CPU.
offload_guardrail_models: false
# Output directory.
output_dir: null
# Preset for automatic sharding.
parallelism_preset: latency
# Run profiler and save report to output directory.
profile: false
sample_overrides:
  # Number of action steps to predict.
  action_chunk_size: null
  # Action mode. When set, activates Action batch construction.
  action_mode: null
  # Path to action JSON file. Required for forward_dynamics mode.
  action_path: null
  # Vision aspect ratio. When None, image_edit preserves the input image's native
  # aspect ratio; all other modes default to 16:9.
  aspect_ratio: null
  # Latent frame indices to condition on. Defaults to [0] for image, [0, 1] for video.
  condition_frame_indexes_vision: null
  # Path to a JSON file of per-modality default sample fields. Overrides the built-in defaults.
  defaults_file: null
  # Action domain name passed to get_domain_id().
  domain_name: null
  # Template string for appending duration/fps to prompt. Use {duration} and {fps} placeholders.
  duration_template: null
  # Extra arguments.
  extra: null
  # Vision frames per second. Recommended range [10, 30]; quality may be degraded outside of this range.
  fps: null
  # Guidance scale for the diffusion model.
  guidance: null
  # Guidance interval for the diffusion model.
  guidance_interval: null
  # Quality of the saved image (0-100).
  image_save_quality: null
  # Target image height in pixels (aspect-ratio-preserving resize).
  image_size: null
  # Inverse template for duration/fps metadata in the negative prompt.
  inverse_duration_template: null
  # Inverse template for resolution metadata in the negative prompt.
  inverse_resolution_template: null
  # Model name.
  model: null
  # Name of the sample.
  name: null
  # Negative prompt metadata mode: 'none', 'same', or 'inverse'.
  negative_metadata_mode: null
  # Negative prompt - describing what you don't want in the generated video.
  negative_prompt: null
  # Compatibility flag. If True and mode is 'none', mode is promoted to 'same'.
  negative_prompt_keep_metadata: null
  # If True, normalize the CFG output.
  normalize_cfg: null
  # Number of vision frames.
  #
  # Range by resolution: 256p: [24, 400], 480p: [24, 300], 720p: [24, 200].
  # Image-only resolutions (e.g. 1080p) require num_frames=1.
  num_frames: null
  # Number of outputs to generate per sample.
  num_outputs: null
  # Number of steps for the diffusion model.
  num_steps: null
  # Output directory.
  output_dir: null
  # Path to data pickle file.
  pickle_file: null
  # Text prompt for generation. Only one of 'prompt' or 'prompt_path' should be provided.
  prompt: null
  # Path to a .txt file containing the prompt. Only one of 'prompt' or 'prompt_path' should be provided.
  prompt_path: null
  # Dimension of the raw action data. Required when action_path is not provided.
  raw_action_dim: null
  # Vision resolution.
  #
  # Defaults to model config resolution.
  resolution: null
  # Template string for appending resolution to prompt. Use {height} and {width} placeholders.
  resolution_template: null
  # Seed for the random number generator.
  seed: null
  # Shift in the UniPC sampler. Ignored when sampler='edm'.
  shift: null
  # Maximum sigma for the EDM sampler. Ignored when sampler='unipc'.
  sigma_max: null
  # Path to data tensors file.
  tensors_file: null
  # Quality of the saved video (0-10).
  video_save_quality: null
  # Path or URL to conditioning image/video.
  vision_path: null
sampler: unipc
tp_size: 1
use_cuda_graphs: false
# If True, use EMA weights. Otherwise, use regular weights.
use_ema_weights: true
# Whether to place pipeline vision decode on a spare local GPU when one is available.
use_separate_pipeline_vision_decode_gpu: false
# Whether to use torch compile.
use_torch_compile: true
# Discriminator.
variant: omni
# Number of warmup generations before each sample.
warmup: 0
