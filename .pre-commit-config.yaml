default_language_version:
  node: 25.2.1
  python: python3.13
exclude: (?x)(
    ^tests/data/
  )
repos:
  - repo: https://github.com/google/addlicense
    rev: v1.2.0
    hooks:
      - id: addlicense
        args: ["-f", "ci/license.txt"]
  - repo: https://github.com/jsh9/markdown-toc-creator
    rev: 0.1.3
    hooks:
      - id: markdown-toc-creator
        args: ["--config=ci/.markdown-toc-creator.toml"]
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.62
    hooks:
      - id: rumdl-fmt
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-symlinks
      - id: check-executables-have-shebangs
        exclude: /_src/
      - id: check-shebang-scripts-are-executable
        exclude: /_src/
  - repo: local
    hooks:
      - id: uv-lock
        name: Generate uv lock files for projects
        entry: ./ci/uv_lock.sh
        language: script
        files: pyproject\.toml$
      - id: uv-lock-script
        name: Generate uv lock files for scripts
        entry: ./ci/uv_lock_script.sh
        language: script
        types: [python]
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - alias: link-check
        name: link check
        id: markdown-link-check
        args: [--config, "ci/.link-check.json", --quiet]
        stages: [manual]
        exclude: (?x)(
            \bATTRIBUTIONS\b|
            /_src/
          )
