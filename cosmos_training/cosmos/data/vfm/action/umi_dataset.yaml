    data_type: low_dim
    # length: 17 # 1 history relative camera pose (velocity)
    length: 16 # Don't include history camera pose
    # normalizer: range # Normalize to [-1, 1]
    normalizer: clamped_range
    augmentation: []
    shape: [9]
    source_entry_names:
      - robot0_eef_pos
      - robot0_eef_rot_axis_angle

  eef_commands:
    name: eef_commands
    data_type: low_dim
    # length: 17 # 1 history eef command (gripper width)
    length: 16 # Don't include history eef command
    normalizer: clamped_range # Normalize to [-1, 1]
    augmentation: []
    shape: [1]
    source_entry_names:
      - robot0_gripper_width

  eef_poses:
    name: eef_poses
    data_type: low_dim
    # length: 17 # 1 history relative camera pose (velocity)
    length: 16 # Don't include history camera pose
    # normalizer: range # Normalize to [-1, 1]
    normalizer: clamped_range
    augmentation: []
    shape: [9]
    source_entry_names:
      - robot0_eef_pos
      - robot0_eef_rot_axis_angle

  grasp_states:
    name: grasp_states
    data_type: low_dim
    # length: 17 # 1 history eef command (gripper width)
    length: 16 # Don't include history eef command
    normalizer: clamped_range # Normalize to [-1, 1]
    augmentation: []
    shape: [6]
    source_entry_names:
      - robot0_gripper_width
