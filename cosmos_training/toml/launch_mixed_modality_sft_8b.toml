# Mirror of launch_mixed_modality_sft_8b.sh, expressed as an interface TOML.
# Paired with: --config=configs/base/config.py  (variant=vfm-base)
#
# Every active entry is set to the Hydra-resolved default for this experiment
# (verified via --dryrun parity against the original direct-CLI launch), with
# the Hydra dotted-path it maps to per scripts/interface_toml.py
# INTERFACE_TO_HYDRA_VFM_BASE. Keys still commented are either: (a) "n/a in
# vfm-base" (no mapping → would WARN if activated), (b) a SKU swap whose
# current value isn't a scalar match for the comment, or (c) a placeholder
# (e.g. job.name = ${now:...}).
#
# Per-user runtime paths still flow through the CLI tail (no interface-schema
# mapping for these Hydra keys):
#   dataloader_train.dataloader.datasets.video.dataset.jsonl_paths=[...]
#   model.config.tokenizer.vae_path=<path>

[job]
# output_dir = ${IMAGINAIRE_OUTPUT_ROOT}/${job.project}/${job.group}/${job.name}
project = "cosmos3"                             # hydra: job.project
group = "sft"                                   # hydra: job.group
#name = "${now:...}"                            # hydra: job.name (timestamp placeholder)
wandb_mode = "disabled"                         # hydra: job.wandb_mode

[train]
max_iter = 500                                  # hydra: trainer.max_iter
logging_iter = 1                                # hydra: trainer.logging_iter

# optimizer
#optm_name = "AdamW"                            # hydra: optimizer (SKU swap; current SKU not a scalar match)
optm_fused = true                               # hydra: optimizer.fused
#optm_init_lr = 2e-5                            # n/a in vfm-base (optimizer.lr is SKU-set; no scalar mapping)
#optm_end_lr = 0                                # n/a in vfm-base
optm_weight_decay = 0                           # hydra: optimizer.weight_decay
optm_betas = [0.9, 0.95]                        # hydra: optimizer.betas
optm_grad_norm_clip = 0.1                       # hydra: trainer.callbacks.grad_clip.clip_norm

# scheduler
optm_warmup_steps = 50                          # hydra: scheduler.warm_up_steps (wrapped as [50])
#optm_decay_type = "cosine"                     # n/a in vfm-base (scheduler SKU is fixed: LambdaCosine)

# precision
param_dtype = "bfloat16"                        # hydra: model.config.parallelism.precision
#master_dtype = "float32"                       # n/a in vfm-base
#fsdp_reduce_dtype = "float32"                  # n/a in vfm-base
#fsdp_offload = false                           # n/a in vfm-base
#fsdp_reshard_after_forward = "default"         # n/a in vfm-base

# compile
compile = true                                  # hydra: model.config.parallelism.use_torch_compile

# batch
#global_batch_per_dp = 1                        # n/a in vfm-base (per-dataset batch_size inside dataloader_train)

# misc
run_validation = false                          # hydra: trainer.run_validation
upload_reproducible_setup = false               # hydra: upload_reproducible_setup


[train.train_policy]
experiment = "mixed_modality_sft_8b"            # hydra: experiment
mini_batch = 2                                  # hydra: trainer.grad_accum_iter

[train.ckpt]
#enable_checkpoint = true                       # hydra: ckpt_type (current=None, would become "dcp" — not a scalar default match)
#checkpoint_storage = "gcp"                     # hydra: checkpoint (SKU swap; current SKU not a scalar match)
save_freq = 100                                 # hydra: checkpoint.save_iter
save_mode = "sync"                              # hydra: checkpoint.dcp_async_mode_enabled (sync → false)
load_path = "/nfs/sw/sw_aidot/users/pzeren/Cosmos-prerelease/workdir/cosmos_opensource/midtrain"  # hydra: checkpoint.load_path

[policy]
model_name_or_path = "Qwen/Qwen3-VL-8B-Instruct"  # hydra: model.config.vlm_config.model_name
#model_safetensor_path = ""                     # hydra: model.config.vlm_config.checkpoint_path (current=None, "" would diverge)
#model_max_length = 16000                       # n/a in vfm-base (SKU-driven)
model_gradient_checkpointing = true             # hydra: model.config.parallelism.use_activation_checkpointing


[policy.parallelism]
dp_shard_size = 4                               # hydra: model.config.parallelism.data_parallel_shard_degree
dp_replicate_size = 1                           # hydra: model.config.parallelism.data_parallel_replicate_degree
cp_size = 1                                     # hydra: model.config.parallelism.context_parallel_shard_degree



[logging]
#logger = ["console", "wandb"]                  # hydra: trainer.callbacks.wandb (no-op SKIP when "wandb" present)
